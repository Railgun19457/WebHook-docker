services:
  webhook-docker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    container_name: webhook-docker
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs