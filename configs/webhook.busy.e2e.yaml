global:
  requestTimeoutSeconds: 30
  maxConcurrentJobsPerHook: 1
  rejectWhenBusy: true

hooks:
  - id: busy
    path: /hooks/busy
    provider: github
    secretEnv: GITHUB_BUSY_SECRET
    enabled: true
    eventTypes: [push]
    executionMode: local
    commandGroups:
      - slow

commandGroups:
  slow:
    steps:
      - ping 127.0.0.1 -n 4 > nul
